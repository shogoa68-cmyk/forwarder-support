name: Test

# 計算ロジックの軽量テスト（ビルド不要・Node だけ）。
# push / PR のたびに走らせ、「壊れたまま公開」を防ぐゲートにする。
# ブラウザでは フォワーダー支援/test/index.html を開くだけでも同じテストが回る。

on:
  push:
    branches: [main]
    paths:
      - 'フォワーダー支援/shared/**'
      - 'フォワーダー支援/test/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'フォワーダー支援/shared/**'
      - 'フォワーダー支援/test/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run calc tests
        run: node "フォワーダー支援/test/run-node.js"
